<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe BI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family:
          "Microsoft YaHei UI",
          "Microsoft YaHei",
          "Noto Sans SC",
          "Segoe UI Variable",
          "Segoe UI",
          system-ui,
          sans-serif;
        background: #f7f4ee;
        color: #1f2329;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 36%),
          linear-gradient(180deg, #fffdf8 0%, #f4f7fb 100%);
        color: #1f2329;
      }
      #boot-card {
        width: min(420px, calc(100vw - 48px));
        padding: 28px 32px;
        border-radius: 18px;
        border: 1px solid rgba(203, 212, 225, 0.92);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(10px);
      }
      #boot-card h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      #boot-card p {
        font-size: 13px;
        line-height: 1.7;
        color: #626872;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div id="boot-card">
        <h1>正在启动 Vibe BI</h1>
        <p>如果此界面长时间不消失，请检查 Electron preload、前端资源和本地 .NET 后端是否已正常启动。</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
